<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Bebas+Neue&family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Josefin+Sans:wght@100;200;300;400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;overflow-x:hidden;}
#root{min-height:600px;}

/* AGENCY */
.ag{background:#0a0a0a;color:#f5f0e8;min-height:600px;}
.ag-nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.06);}
.ag-logo{font-family:'Playfair Display',serif;font-size:1.1rem;letter-spacing:.1em;color:#f5f0e8;}
.ag-logo span{color:#e8a030;}
.ag-nav-links{display:flex;gap:1.5rem;list-style:none;}
.ag-nav-links a{color:rgba(245,240,232,.5);text-decoration:none;font-size:.75rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;transition:color .2s;}
.ag-nav-links a:hover{color:#e8a030;}
.ag-cta{background:#e8a030;color:#0a0a0a;border:none;padding:.55rem 1.2rem;font-weight:700;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}

.ag-hero{padding:3rem 2rem 2rem;position:relative;overflow:hidden;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:50px 50px;}
.hero-orb{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(232,160,48,.1),transparent 70%);right:-80px;top:50%;transform:translateY(-50%);}
.hero-inner{position:relative;z-index:2;max-width:650px;}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(232,160,48,.1);border:1px solid rgba(232,160,48,.2);color:#e8a030;padding:.35rem .9rem;font-size:.65rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.5rem;}
.hero-badge::before{content:'';width:5px;height:5px;background:#e8a030;border-radius:50%;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hero-h1{font-family:'Playfair Display',serif;font-size:2.8rem;line-height:1.05;font-weight:700;margin-bottom:1rem;}
.hero-h1 em{font-style:italic;color:#e8a030;}
.hero-sub{font-size:.9rem;color:rgba(245,240,232,.5);line-height:1.8;max-width:480px;margin-bottom:1.5rem;font-weight:300;}
.hero-btns{display:flex;gap:.8rem;flex-wrap:wrap;}
.btn-gold{background:#e8a030;color:#0a0a0a;border:none;padding:.75rem 1.6rem;font-weight:700;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-gold:hover{background:#f5b840;}
.btn-outline{background:transparent;color:#f5f0e8;border:1px solid rgba(245,240,232,.2);padding:.75rem 1.6rem;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:#e8a030;color:#e8a030;}
.stats-row{display:flex;gap:2rem;margin-top:2.5rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap;}
.stat-n{font-family:'Playfair Display',serif;font-size:1.8rem;color:#e8a030;}
.stat-l{font-size:.65rem;color:rgba(245,240,232,.4);text-transform:uppercase;letter-spacing:.1em;margin-top:.15rem;}

.designs-sec{padding:2.5rem 2rem;}
.sec-head{text-align:center;margin-bottom:2.5rem;}
.sec-tag{display:inline-block;color:#e8a030;font-size:.65rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.7rem;}
.sec-h2{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;}
.sec-h2 em{font-style:italic;color:#e8a030;}
.sec-sub{color:rgba(245,240,232,.4);margin-top:.6rem;font-size:.85rem;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.7;}

.designs-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;max-width:1000px;margin:0 auto;}
.dcard{background:#111;cursor:pointer;transition:transform .3s,box-shadow .3s;border:1px solid rgba(255,255,255,.05);}
.dcard:hover{transform:translateY(-6px);box-shadow:0 16px 50px rgba(0,0,0,.5);}
.dcard-preview{height:220px;position:relative;overflow:hidden;}
.dcard-overlay{position:absolute;inset:0;background:rgba(10,10,10,.75);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;}
.dcard:hover .dcard-overlay{opacity:1;}
.dcard-overlay-btn{color:#e8a030;border:1px solid #e8a030;padding:.5rem 1.2rem;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;}
.dcard-info{padding:1.2rem;}
.dcard-num{font-size:.65rem;color:#e8a030;letter-spacing:.18em;margin-bottom:.3rem;font-family:'DM Sans',monospace;}
.dcard-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:.25rem;}
.dcard-desc{font-size:.75rem;color:rgba(245,240,232,.45);line-height:1.6;margin-bottom:.8rem;}
.dcard-tags{display:flex;gap:.4rem;flex-wrap:wrap;}
.dcard-tag{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);padding:.2rem .6rem;font-size:.62rem;letter-spacing:.07em;color:rgba(245,240,232,.5);}

/* MINI PREVIEWS */
.p1{background:#0d0b08;height:100%;padding:.8rem;font-family:'Cormorant Garamond',serif;display:flex;flex-direction:column;}
.p1-nav{display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;border-bottom:1px solid rgba(212,175,55,.2);margin-bottom:.6rem;}
.p1-logo{font-size:.6rem;letter-spacing:.3em;color:#d4af37;text-transform:uppercase;}
.p1-links{display:flex;gap:.5rem;}
.p1-links span{font-size:.45rem;color:rgba(212,175,55,.45);letter-spacing:.08em;text-transform:uppercase;}
.p1-hero{flex:1;background:linear-gradient(150deg,#1a1208,#0d0b08);border:1px solid rgba(212,175,55,.1);display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:.8rem;position:relative;}
.p1-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 80% 40%,rgba(139,69,19,.25),transparent 60%);}
.p1-eye{font-size:.4rem;letter-spacing:.3em;color:#d4af37;text-transform:uppercase;position:relative;z-index:1;margin-bottom:.25rem;}
.p1-h{font-size:1.2rem;line-height:1.05;color:#f5edd8;position:relative;z-index:1;}
.p1-h em{font-style:italic;color:#d4af37;}
.p1-btn{margin-top:.4rem;background:transparent;border:1px solid #d4af37;color:#d4af37;font-family:'Cormorant Garamond',serif;font-size:.42rem;letter-spacing:.18em;text-transform:uppercase;padding:.25rem .6rem;cursor:pointer;position:relative;z-index:1;}
.p1-strips{display:flex;gap:.25rem;margin-top:.4rem;position:relative;z-index:1;}
.p1-strip{flex:1;height:2.5px;}

.p2{background:#f5f011;height:100%;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;}
.p2-nav{background:#111;display:flex;justify-content:space-between;align-items:center;padding:.4rem .7rem;}
.p2-logo{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:#f5f011;letter-spacing:.05em;}
.p2-obtn{background:#f5f011;color:#111;font-size:.4rem;font-weight:800;padding:.18rem .45rem;border:none;text-transform:uppercase;letter-spacing:.08em;}
.p2-hero{flex:1;padding:.7rem;display:flex;flex-direction:column;justify-content:center;position:relative;}
.p2-dots{position:absolute;right:.4rem;top:.4rem;display:grid;grid-template-columns:repeat(4,5px);gap:2.5px;}
.p2-dot{width:5px;height:5px;background:#111;opacity:.2;border-radius:50%;}
.p2-big{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:.9;color:#111;}
.p2-big span{color:#e83a20;}
.p2-s{font-size:.5rem;color:#111;font-weight:700;margin-top:.35rem;letter-spacing:.05em;text-transform:uppercase;}
.p2-pills{display:flex;gap:.25rem;margin-top:.5rem;flex-wrap:wrap;}
.p2-pill{background:#111;color:#f5f011;font-size:.42rem;font-weight:700;padding:.18rem .45rem;border-radius:50px;text-transform:uppercase;}
.p2-pill.r{background:#e83a20;}

.p3{background:#f7f2e8;height:100%;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;}
.p3-nav{display:flex;justify-content:space-between;align-items:center;padding:.45rem .7rem;border-bottom:1px solid rgba(101,88,72,.1);}
.p3-logo{font-family:'Playfair Display',serif;font-size:.7rem;color:#4a3f30;}
.p3-logo em{font-style:italic;color:#7a5c2e;}
.p3-lnks span{font-size:.42rem;color:rgba(74,63,48,.45);margin:0 .25rem;text-transform:uppercase;letter-spacing:.08em;}
.p3-hero{display:flex;flex:1;}
.p3-left{flex:1;padding:.7rem;display:flex;flex-direction:column;justify-content:center;}
.p3-eye{font-size:.4rem;color:#8b6914;letter-spacing:.18em;text-transform:uppercase;margin-bottom:.35rem;}
.p3-h{font-size:1.05rem;color:#4a3f30;line-height:1.15;}
.p3-h em{font-style:italic;color:#7a5c2e;}
.p3-d{font-size:.45rem;color:rgba(74,63,48,.55);line-height:1.6;margin-top:.35rem;}
.p3-btn{display:inline-block;margin-top:.4rem;background:#4a3f30;color:#f7f2e8;font-size:.42rem;letter-spacing:.08em;text-transform:uppercase;padding:.25rem .6rem;border:none;cursor:pointer;}
.p3-right{width:42%;background:linear-gradient(145deg,#c8a96e,#8b6914);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.p3-leaf{position:absolute;font-size:1.2rem;opacity:.3;}
.p3-circle{width:55px;height:55px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;}
.p3-ci{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);}
.p3-bottom{display:flex;}
.p3-si{flex:1;padding:.35rem .5rem;background:#efe8d8;border-right:1px solid rgba(101,88,72,.1);}
.p3-si:last-child{border-right:none;background:#ddd6c4;}
.p3-sl{font-size:.38rem;text-transform:uppercase;letter-spacing:.08em;color:#8b6914;}
.p3-sv{font-size:.5rem;color:#4a3f30;font-weight:600;margin-top:.08rem;}

.p4{background:#fafafa;height:100%;font-family:'Josefin Sans',sans-serif;display:flex;flex-direction:column;}
.p4-nav{display:flex;justify-content:space-between;align-items:center;padding:.5rem .8rem;border-bottom:1px solid rgba(0,0,0,.07);}
.p4-logo{font-size:.6rem;letter-spacing:.5em;color:#111;font-weight:200;text-transform:uppercase;}
.p4-logo span{color:#c41e3a;}
.p4-nr{display:flex;gap:.7rem;align-items:center;}
.p4-nls span{font-size:.38rem;color:rgba(0,0,0,.3);letter-spacing:.18em;text-transform:uppercase;margin:0 .25rem;}
.p4-rbtn{background:#c41e3a;color:#fff;font-size:.38rem;letter-spacing:.12em;text-transform:uppercase;padding:.22rem .55rem;border:none;cursor:pointer;}
.p4-hero{flex:1;display:flex;}
.p4-left{flex:1.2;display:flex;flex-direction:column;justify-content:center;padding:.8rem;}
.p4-jp{font-size:.55rem;color:rgba(0,0,0,.18);letter-spacing:.1em;margin-bottom:.4rem;font-weight:100;}
.p4-h{font-size:1.3rem;color:#111;line-height:1;font-weight:100;letter-spacing:.05em;text-transform:uppercase;}
.p4-h strong{font-weight:400;}
.p4-line{width:20px;height:1px;background:#c41e3a;margin:.4rem 0;}
.p4-sub{font-size:.4rem;color:rgba(0,0,0,.35);line-height:1.8;font-weight:300;letter-spacing:.04em;max-width:110px;}
.p4-right{flex:1;background:#111;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.p4-ring{width:70px;height:70px;border-radius:50%;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;animation:spin 25s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.p4-ring2{width:48px;height:48px;border-radius:50%;border:1px solid rgba(196,30,58,.3);display:flex;align-items:center;justify-content:center;animation:spin 15s linear infinite reverse;}
.p4-ring3{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;}
.p4-dot{width:6px;height:6px;border-radius:50%;background:#c41e3a;}
.p4-bottom{display:flex;border-top:1px solid rgba(0,0,0,.07);}
.p4-bi{flex:1;padding:.35rem .5rem;border-right:1px solid rgba(0,0,0,.07);}
.p4-bi:last-child{border-right:none;}
.p4-bl{font-size:.33rem;color:rgba(0,0,0,.28);letter-spacing:.13em;text-transform:uppercase;margin-bottom:.1rem;}
.p4-bv{font-size:.48rem;color:#111;font-weight:300;}
.p4-bv span{color:#c41e3a;}

/* BACK BTN */
.back-btn{position:sticky;top:0;left:0;z-index:9999;display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);color:#fff;padding:.45rem .9rem;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;margin-bottom:0;}
.back-btn:hover{background:rgba(0,0,0,.9);}

/* ── FULL DESIGNS ── */
/* EMBER & OAK */
.eo{font-family:'Cormorant Garamond',serif;background:#090805;color:#f5edd8;min-height:600px;}
.eo-nav{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 2.5rem;background:#090805;border-bottom:1px solid rgba(212,175,55,.1);}
.eo-logo-w{text-align:center;}
.eo-logo-m{font-size:1.1rem;letter-spacing:.3em;color:#d4af37;text-transform:uppercase;font-weight:600;}
.eo-logo-s{font-size:.5rem;letter-spacing:.4em;color:rgba(212,175,55,.4);text-transform:uppercase;}
.eo-nl{display:flex;gap:2rem;list-style:none;}
.eo-nl a{color:rgba(245,237,216,.5);text-decoration:none;font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;transition:color .2s;font-family:'DM Sans',sans-serif;}
.eo-nl a:hover{color:#d4af37;}
.eo-rl{color:#d4af37 !important;border:1px solid rgba(212,175,55,.35);padding:.35rem 1rem;}

.eo-hero{min-height:420px;position:relative;display:flex;align-items:center;overflow:hidden;}
.eo-hbg{position:absolute;inset:0;background:linear-gradient(135deg,#1a0f00,rgba(9,8,5,0) 50%),radial-gradient(ellipse at 72% 50%,rgba(139,69,19,.2),transparent 55%);}
.eo-htex{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(212,175,55,.015) 0,rgba(212,175,55,.015) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,rgba(212,175,55,.015) 0,rgba(212,175,55,.015) 1px,transparent 1px,transparent 40px);}
.eo-himg{position:absolute;right:0;top:0;bottom:0;width:48%;background:linear-gradient(to left,rgba(9,8,5,0),rgba(9,8,5,1) 65%),linear-gradient(135deg,#2d1a05,#1a0f00);clip-path:polygon(14% 0,100% 0,100% 100%,0 100%);}
.eo-hplate{position:absolute;right:10%;top:50%;transform:translateY(-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#3d2510,#1a0f00);border:1px solid rgba(212,175,55,.18);display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(212,175,55,.06);}
.eo-hpi{width:155px;height:155px;border-radius:50%;border:1px solid rgba(212,175,55,.1);display:flex;align-items:center;justify-content:center;font-size:4rem;}
.eo-hc{position:relative;z-index:2;padding:0 2.5rem;max-width:560px;}
.eo-pre{display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;}
.eo-line{width:30px;height:1px;background:#d4af37;}
.eo-pt{font-size:.62rem;letter-spacing:.3em;color:#d4af37;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.eo-h1{font-size:3.2rem;line-height:1;font-weight:300;}
.eo-h1 em{font-style:italic;color:#d4af37;display:block;}
.eo-h1 strong{font-weight:600;display:block;}
.eo-hdesc{font-size:.95rem;color:rgba(245,237,216,.45);line-height:1.85;margin:1.2rem 0 1.8rem;max-width:380px;font-style:italic;font-weight:300;}
.eo-hbtns{display:flex;gap:.8rem;flex-wrap:wrap;}
.eo-bgold{background:#d4af37;color:#1a0f00;padding:.75rem 1.8rem;font-family:'DM Sans',sans-serif;font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;font-weight:700;border:none;cursor:pointer;transition:all .2s;}
.eo-bgold:hover{background:#e8c84a;}
.eo-bghost{background:transparent;color:#d4af37;border:1px solid rgba(212,175,55,.35);padding:.75rem 1.8rem;font-family:'DM Sans',sans-serif;font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.eo-bghost:hover{border-color:#d4af37;}

.eo-scroll{overflow:hidden;background:#120d04;border-top:1px solid rgba(212,175,55,.08);border-bottom:1px solid rgba(212,175,55,.08);padding:.55rem 0;}
.eo-sci{display:flex;gap:2.5rem;animation:sl 22s linear infinite;white-space:nowrap;}
@keyframes sl{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.eo-si{font-size:.58rem;letter-spacing:.28em;color:rgba(212,175,55,.38);text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.eo-sd{color:#d4af37;margin:0 1.2rem;}

.eo-about{display:grid;grid-template-columns:1fr 1fr;gap:4rem;padding:5rem 2.5rem;align-items:center;}
.eo-atag{font-size:.6rem;letter-spacing:.28em;color:#d4af37;text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-bottom:.8rem;display:flex;align-items:center;gap:.8rem;}
.eo-atag::before{content:'';width:24px;height:1px;background:#d4af37;}
.eo-ah2{font-size:2.2rem;font-weight:300;line-height:1.2;margin-bottom:1.2rem;}
.eo-ah2 em{font-style:italic;color:#d4af37;}
.eo-ap{font-size:.92rem;color:rgba(245,237,216,.45);line-height:2;font-style:italic;font-weight:300;margin-bottom:1.2rem;}
.eo-ap2{font-size:.8rem;color:rgba(245,237,216,.35);line-height:1.9;font-family:'DM Sans',sans-serif;font-weight:300;}
.eo-sgrid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.eo-sbox{background:rgba(212,175,55,.04);border:1px solid rgba(212,175,55,.1);padding:1.5rem;text-align:center;}
.eo-sbox.f{background:rgba(212,175,55,.09);border-color:rgba(212,175,55,.22);}
.eo-snum{font-size:2.4rem;color:#d4af37;font-weight:300;}
.eo-slabel{font-size:.6rem;letter-spacing:.2em;color:rgba(245,237,216,.38);text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-top:.35rem;}

.eo-menu{padding:4rem 2.5rem;background:#0d0b06;}
.eo-mhead{text-align:center;margin-bottom:2.5rem;}
.eo-mtag{font-size:.6rem;letter-spacing:.32em;color:#d4af37;text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-bottom:.8rem;}
.eo-mh2{font-size:2.4rem;font-weight:300;}
.eo-mh2 em{font-style:italic;color:#d4af37;}
.eo-tabs{display:inline-flex;border:1px solid rgba(212,175,55,.14);margin-bottom:2.5rem;}
.eo-tab{padding:.55rem 1.5rem;font-family:'DM Sans',sans-serif;font-size:.68rem;letter-spacing:.13em;text-transform:uppercase;background:transparent;color:rgba(245,237,216,.38);border:none;cursor:pointer;transition:all .2s;border-right:1px solid rgba(212,175,55,.14);}
.eo-tab:last-child{border-right:none;}
.eo-tab.active{background:rgba(212,175,55,.09);color:#d4af37;}
.eo-mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:900px;margin:0 auto;}
.eo-mi{border:1px solid rgba(212,175,55,.09);padding:1.5rem;transition:all .3s;}
.eo-mi:hover{border-color:rgba(212,175,55,.25);background:rgba(212,175,55,.02);}
.eo-mie{font-size:1.8rem;margin-bottom:.8rem;}
.eo-mitags{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.5rem;}
.eo-mitag{font-size:.52rem;border:1px solid rgba(212,175,55,.18);color:rgba(212,175,55,.55);padding:.12rem .45rem;letter-spacing:.08em;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.eo-min{font-size:1.05rem;font-weight:600;margin-bottom:.3rem;}
.eo-mid{font-size:.78rem;color:rgba(245,237,216,.38);line-height:1.7;font-style:italic;font-weight:300;margin-bottom:.8rem;}
.eo-mip{font-size:.95rem;color:#d4af37;}

let state = { view: 'agency', menuTab: 'starters' };

function setState(updates) {
  state = {...state, ...updates};
  render();
}

function render() {
  const root = document.getElementById('root');
  if (state.view === 'agency') root.innerHTML = agencyHTML();
  else if (state.view === 'd1') root.innerHTML = emberOakHTML();
  else if (state.view === 'd2') root.innerHTML = zestyHTML();
  else if (state.view === 'd3') root.innerHTML = floraCafeHTML();
  else if (state.view === 'd4') root.innerHTML = mizuHTML();
  attachEvents();
}

function attachEvents() {
  document.querySelectorAll('[data-view]').forEach(el => {
    el.addEventListener('click', () => setState({view: el.dataset.view}));
  });
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => setState({menuTab: el.dataset.tab}));
  });
}
